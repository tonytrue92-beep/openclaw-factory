# ═══════════════════════════════════════════════════════════════════════
#  Wrangler config — Install analytics Worker (D1)
#
#  Деплой (см. README.md):
#    1. npm install -g wrangler && wrangler login
#    2. wrangler d1 create aiteam-installs   → вставить database_id ниже
#    3. wrangler d1 execute aiteam-installs --remote --file=schema.sql
#    4. wrangler secret put ADMIN_SECRET     → длинная случайная строка
#    5. wrangler deploy
# ═══════════════════════════════════════════════════════════════════════

name = "aiteam-installs"
main = "worker.js"
compatibility_date = "2026-01-01"

# Бесплатный домен *.workers.dev:
#   https://aiteam-installs.<аккаунт>.workers.dev
workers_dev = true

# Свой домен (опц.) — раскомментировать + добавить в Cloudflare DNS:
# routes = [
#   { pattern = "installs.tonytrue.pro/*", zone_name = "tonytrue.pro" }
# ]

[[d1_databases]]
binding = "DB"
database_name = "aiteam-installs"
database_id = "<вставить-после: wrangler d1 create aiteam-installs>"

# ADMIN_SECRET задаётся через `wrangler secret put ADMIN_SECRET` (не в файле).
