# Lint and smoke-test the installer on every push to main/PR.
# This workflow does NOT use any user-controlled inputs (issue/PR titles,
# commit messages, etc.) in its run steps — it only operates on files
# in the repository and tool outputs. So no command-injection surface.

name: Lint & smoke

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'tests/**'
      - 'SHA256SUMS'
      - 'cloudflare/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
      - 'tests/**'
      - 'SHA256SUMS'
      - 'cloudflare/**'
      - 'docs/**'

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: |
          # --severity=warning: игнорируем style/info (шум);
          # --exclude: отключаем проверки, которые у нас осознанные:
          #   SC1090/1091 — dynamic source paths (используем в смоке);
          #   SC2155 — declare-and-assign (косметика);
          #   SC2086 — quoting (иногда оправдано);
          #   SC2034 — unused variable (резервные константы в палитре/флаги;
          #            реальные баги в этом классе ловит скорее bash -n или
          #            smoke-тест, а shellcheck тут даёт много шума).
          # R2-аудит: глоб вместо перечисления — новые скрипты (add-codex и
          # будущие) не выпадают из проверки.
          shellcheck \
            --severity=warning \
            --exclude=SC1090,SC1091,SC2155,SC2086,SC2034 \
            scripts/*.sh

      - name: Worker syntax (node --check)
        run: |
          # cloudflare/worker.js — единственный JS в репо; ловим синтакс-ошибки
          if [[ -f cloudflare/worker.js ]]; then
            cp cloudflare/worker.js /tmp/worker-check.mjs
            node --check /tmp/worker-check.mjs
            echo "OK: worker.js синтаксически валиден"
          fi

  syntax:
    name: bash -n (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check syntax of all shell scripts
        run: |
          set -euo pipefail
          for f in scripts/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done
          echo "all scripts pass bash -n"

  smoke:
    name: Helper functions smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and run helpers
        run: bash .github/workflows/smoke-test.sh

  security-audit:
    name: Security audit (no secret leaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static check for secret-leak patterns
        run: bash .github/workflows/security-audit.sh

  checksums:
    name: SHA256SUMS freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SHA256SUMS is up to date
        run: |
          set -euo pipefail
          if [[ ! -f SHA256SUMS ]]; then
            echo "SHA256SUMS file is missing. Run: bash scripts/update-checksums.sh"
            exit 1
          fi
          # Пересчитываем хэши во временный файл и сравниваем только хэш-строки
          # (комментарии с датой/коммитом игнорируем — они каждый раз разные).
          tmp=$(mktemp)
          for f in scripts/*.sh; do
            sha256sum "$f" >> "$tmp"
          done
          committed=$(grep -vE '^(#|$)' SHA256SUMS | sort)
          current=$(sort "$tmp")
          if [[ "$committed" != "$current" ]]; then
            echo "SHA256SUMS is out of date. Run: bash scripts/update-checksums.sh"
            echo ""
            echo "--- committed ---"
            echo "$committed"
            echo "--- current ---"
            echo "$current"
            exit 1
          fi
          echo "SHA256SUMS is up to date"

  docker-smoke:
    name: Docker smoke (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [debian, alpine]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t openclaw-factory-test:${{ matrix.variant }} -f tests/docker/Dockerfile.${{ matrix.variant }} .
      - name: Run smoke checks
        run: docker run --rm openclaw-factory-test:${{ matrix.variant }}
